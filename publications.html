            },
            {

                authors: '<strong>Jiaojiao Guan</strong>, Yongxin Ji, Cheng Peng, Wei Zou, Xubo Tang, Jiayu Shang, Yanni Sun',
                venue: 'Briefings in Bioinformatics',
                link: 'https://academic.oup.com/bib/article/26/1/bbaf014/7966747'
            },
            {

            {

            // 2024
            {

            },
            {
                year: '2024',
                title: 'Accurate and efficient protein embedding using multi-teacher distillation learning',
                authors: 'Jiayu Shang, Cheng Peng, Yongxin Ji, <strong>Jiaojiao Guan</strong>, Dehan Cai, Xubo Tang, Yanni Sun',

                link: 'https://academic.oup.com/bioinformatics/article/40/9/btae567/7772445'
            },
            {
                year: '2024',
                title: 'PlasGO: enhancing GO-based function prediction for plasmid-encoded proteins based on genetic structure',

                year: '2023',

            // Earlier
            {

                title: 'An end-to-end heterogeneous graph representation learning-based framework for drug-target interaction prediction',

                venue: 'Methods',
                link: null
            },
            {
                year: '2019',
                title: 'Predicting Parkinson\'s disease genes based on node2vec and autoencoder',
                authors: 'Jiajie Peng, <strong>Jiaojiao Guan</strong>, Xuequn Shang',
                venue: 'Frontiers in Genetics',
                link: 'https://www.frontiersin.org/journals/genetics/articles/10.3389/fgene.2019.00226/full'
            }
        ];

        // 渲染所有论文
        function renderPublications() {
            const publicationsList = document.getElementById('publications-list');
            const years = [...new Set(publicationsData.map(p => p.year))].sort((a, b) => b - a);

            let html = '';
            years.forEach(year => {
                const papers = publicationsData.filter(p => p.year === year);
                html += `<h4 class="mt-4 mb-3 text-muted">${year}</h4>`;
                papers.forEach(paper => {
                    const titleHtml = paper.link
                        ? `<a href="${paper.link}" target="_blank">${paper.title}</a>`
                        : paper.title;
                    html += `
                        <div class="publication-item">
                            <div class="publication-title">${titleHtml}</div>
                            <div class="publication-authors">${paper.authors}</div>
                            <div class="publication-venue">${paper.venue}, ${paper.year}</div>
                        </div>
                    `;
                });
            });

            publicationsList.innerHTML = html;
        }

        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            renderPublications();
        });
    </script>
